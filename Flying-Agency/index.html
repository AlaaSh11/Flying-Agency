<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CTRL ELITE — Fly in Style</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;overflow-x:hidden;cursor:none;background:#0C0610}
#root{min-height:100vh}
#cur{position:fixed;width:10px;height:10px;border-radius:50%;pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width 0.25s,height 0.25s,background 0.4s;mix-blend-mode:screen}
#cur-ring{position:fixed;width:34px;height:34px;border-radius:50%;border:1px solid;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);transition:width 0.4s,height 0.4s,border-color 0.4s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{border-radius:10px}

@keyframes floatY{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-22px) rotate(1.5deg)}66%{transform:translateY(-10px) rotate(-1deg)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spinSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.45;transform:scale(0.92)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideL{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes bloom{0%{transform:scale(0.6) rotate(-12deg);opacity:0}80%{transform:scale(1.04) rotate(1deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes twinkle{0%,100%{opacity:0.08;transform:scale(0.6)}50%{opacity:1;transform:scale(1.4)}}
@keyframes orb{0%{transform:translate(0,0) scale(1)}25%{transform:translate(32px,-22px) scale(1.06)}50%{transform:translate(-12px,32px) scale(0.95)}75%{transform:translate(-32px,-12px) scale(1.04)}100%{transform:translate(0,0) scale(1)}}
@keyframes revealLine{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes ripple{0%{transform:translate(-50%,-50%) scale(0);opacity:0.5}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
@keyframes glowBreath{0%,100%{box-shadow:0 0 20px var(--g1,rgba(240,122,184,0.2))}50%{box-shadow:0 0 50px var(--g1,rgba(240,122,184,0.4)),0 0 80px var(--g2,rgba(176,122,240,0.2))}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes gradMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
</style>
</head>
<body>
<div id="cur"></div>
<div id="cur-ring"></div>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
